<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoloTable — Experiment Mode</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="ExMode.css">
  <link rel="stylesheet" href="global.css">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='%2300f2ff' stroke-width='4' stroke-dasharray='10 6'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%2300f2ff'/%3E%3C/svg%3E">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>
  <video class="input_video" autoplay playsinline></video>

  <div id="hand-cursor-1" class="hand-cursor"></div>
  <div id="hand-cursor-2" class="hand-cursor"></div>

  <nav class="top-bar">
    <button onclick="window.location.href='home.html'">
      ← RETURN
    </button>
    <div class="controls-group camera-group">
      <button id="camera-toggle" class="camera-btn" title="Toggle Motion Control" style="display: none;">
        <span class="cam-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 7l-7 5 7 5V7z" />
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
          </svg>
        </span>
        <span class="cam-label">Camera&nbsp;OFF</span>
        <span class="cam-status-dot"></span>
      </button>
    </div>
    <h1>⚗ HOLOTABLE // EXPERIMENT MODE</h1>
  </nav>

  <main class="experiment-ui">

    <section class="elements-panel">
      <h2>AVAILABLE ELEMENTS</h2>

      <div class="element-list" id="element-list">
      </div>
    </section>

    <section class="reaction-zone">

      <div class="drop-zone" id="drop-zone">
        DROP ELEMENTS HERE
      </div>

      <button id="combine-btn">
        COMBINE
      </button>

      <div class="reaction-result" id="reaction-result">

        <div id="reaction-status">
          <p>> SYSTEM IDLE...</p>
          <p>> AWAITING ELEMENT INPUT</p>
        </div>

        <div id="reaction-success-ui" style="display: none;">
          <h2 style="color: var(--neon-green);">REACTION SUCCESSFUL</h2>
          <h3 id="compound-name"></h3>
          <p>Formula: <span id="compound-formula"></span></p>

          <div class="structure-container">
            <img id="compound-image" src="" alt="2D Structure" class="compound-structure-2d" />
            <p id="image-error" style="display: none;">Structure not available</p>
          </div>
        </div>

      </div>

    </section>

  </main>
  <script src="ExperimentMode.js" defer></script>
  <script src="./ar-core.js"></script>

</body>

</html>
