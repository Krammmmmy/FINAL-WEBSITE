<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoloTable — Experiment Mode</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="ExMode.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='%2300f2ff' stroke-width='4' stroke-dasharray='10 6'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%2300f2ff'/%3E%3C/svg%3E">
</head>

<body>

  <nav class="top-bar">
    <button onclick="window.location.href='index.html'">
      ← RETURN
    </button>

    <h1>⚗ HOLOTABLE // EXPERIMENT MODE</h1>
  </nav>

  <main class="experiment-ui">

    <section class="elements-panel">
      <h2>AVAILABLE ELEMENTS</h2>

      <div class="element-list" id="element-list">
      </div>
    </section>

    <section class="reaction-zone">

      <div class="drop-zone" id="drop-zone">
        DROP ELEMENTS HERE
      </div>

      <button id="combine-btn">
        COMBINE
      </button>

      <div class="reaction-result" id="reaction-result">
        Waiting for experiment...
      </div>

    </section>

  </main>

  <script src="ExperimentMode.js" defer></script>

</body>
</html>
